<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Trading</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #c2e9fb, #a1c4fd);
    color: #333;
}

/* HERO */
.hero {
    text-align: center;
    padding: 120px 20px;
    color: white;
    background: rgba(0,0,0,0.3);
}

.hero h1 {
    font-size: 50px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 20px;
}

/* BUTTONS */
.btn {
    display: inline-block;
    padding: 12px 25px;
    margin: 10px;
    border-radius: 25px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.btn-primary {
    background: #ff7b00;
    color: white;
}

.btn-primary:hover {
    background: #ff5500;
}

.btn-paypal {
    background: #003087;
    color: white;
}

.btn-paypal:hover {
    background: #001f5c;
}

/* ABOUT */
.about {
    padding: 60px 20px;
    max-width: 800px;
    margin: auto;
    text-align: center;
}

.about h2 {
    font-size: 32px;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Didmeninė automobilių prekyba</h1>
    <p>Patikimi automobiliai geriausiomis kainomis</p>

    <a class="btn btn-primary" href="#about">Apie mus</a>
    <a class="btn btn-paypal" href="https://www.paypal.com" target="_blank">Apmokėti per PayPal</a>
</div>

<div id="about" class="about">
    <h2>Apie mus</h2>
    <p>
        Mes užsiimame didmenine automobilių prekyba visoje Europoje.  
        Siūlome patikrintus automobilius, geras kainas ir greitą aptarnavimą.
    </p>
</div>

</body>
</html>
